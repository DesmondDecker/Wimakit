# ─────────────────────────────────────────────────────────────────────────────
# WimaKit Web (Expo) – Fly.io Configuration
# ─────────────────────────────────────────────────────────────────────────────

app            = "wimakit-web"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile.web"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256

[[http_service.checks]]
  grace_period = "5s"
  interval     = "30s"
  method       = "GET"
  timeout      = "5s"
  path         = "/"
